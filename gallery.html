<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
  <title>Gallery — Aabha Joshi</title>
  <meta name="description" content="Browse and buy original oil, acrylic and watercolour paintings by Aabha Joshi.">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <section class="section">
    <div class="container">
      <div class="section-head">
        <p class="eyebrow">The Collection</p>
        <h2>Gallery</h2>
        <p>Every painting is an original, signed work. Click <strong>Buy</strong> on any available piece to send me an enquiry.</p>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-medium="all">All Media</button>
        <button class="filter-btn" data-medium="oil">Oil</button>
        <button class="filter-btn" data-medium="acrylic">Acrylic</button>
        <button class="filter-btn" data-medium="watercolor">Watercolour</button>
        <span class="divider"></span>
        <button class="filter-btn active" data-avail="all">All</button>
        <button class="filter-btn" data-avail="available">Available</button>
        <button class="filter-btn" data-avail="sold">Sold</button>
      </div>

      <div class="grid" id="gallery-grid"></div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script>renderChrome("gallery"); initGallery();</script>
</body>
</html>
